<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="응원">
<meta name="theme-color" content="#0a0a12">
<title>응원 네온사인</title>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-pink: #ff6ec7;
    --neon-blue: #00d4ff;
    --neon-green: #39ff14;
    --neon-yellow: #fff01f;
    --neon-purple: #bf00ff;
    --neon-white: #ffffff;
  }

  body {
    background: #0a0a12;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
    overflow: hidden;
    position: relative;
    touch-action: manipulation;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* Brick wall background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 48px,
        rgba(60, 40, 30, 0.3) 48px,
        rgba(60, 40, 30, 0.3) 50px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 98px,
        rgba(60, 40, 30, 0.25) 98px,
        rgba(60, 40, 30, 0.25) 100px
      );
    background-size: 100px 50px;
    opacity: 0.5;
    z-index: 0;
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  /* Main container */
  .main-container {
    position: relative;
    z-index: 10;
    text-align: center;
    width: 96vw;
    max-width: none;
    padding: 10px;
  }

  /* Neon frame */
  .neon-frame {
    border: 2px solid rgba(255, 110, 199, 0.25);
    border-radius: 30px;
    padding: 30px 20px;
    position: relative;
    box-shadow:
      0 0 8px rgba(255, 110, 199, 0.15),
      inset 0 0 8px rgba(255, 110, 199, 0.05);
    animation: framePulse 3s ease-in-out infinite;
  }

  @keyframes framePulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255, 110, 199, 0.15), inset 0 0 8px rgba(255, 110, 199, 0.05); }
    50% { box-shadow: 0 0 16px rgba(255, 110, 199, 0.25), inset 0 0 12px rgba(255, 110, 199, 0.08); }
  }

  /* Decorative corner lights */
  .corner {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--neon-yellow);
    box-shadow: 0 0 6px var(--neon-yellow), 0 0 12px rgba(255, 240, 31, 0.4);
    animation: cornerBlink 1.5s ease-in-out infinite;
  }
  .corner-tl { top: -4px; left: -4px; }
  .corner-tr { top: -4px; right: -4px; animation-delay: 0.3s; }
  .corner-bl { bottom: -4px; left: -4px; animation-delay: 0.6s; }
  .corner-br { bottom: -4px; right: -4px; animation-delay: 0.9s; }

  @keyframes cornerBlink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* Main neon text */
  .neon-name {
    font-family: 'Bagel Fat One', 'Apple SD Gothic Neo', cursive;
    font-size: clamp(64px, 18vw, 200px);
    line-height: 1.15;
    margin-bottom: 8px;
    transition: all 0.5s ease;
  }

  .neon-message {
    font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
    font-size: clamp(36px, 10vw, 120px);
    line-height: 1.2;
    margin-top: 10px;
    transition: all 0.5s ease;
  }

  /* Color themes - base color only, glow set dynamically via JS */
  .theme-pink .neon-name, .theme-pink .neon-message { color: var(--neon-pink); }
  .theme-blue .neon-name, .theme-blue .neon-message { color: var(--neon-blue); }
  .theme-green .neon-name, .theme-green .neon-message { color: var(--neon-green); }
  .theme-white .neon-name, .theme-white .neon-message { color: var(--neon-white); }
  .theme-rainbow .neon-message { color: var(--neon-yellow); }
  .theme-rainbow .neon-name {
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-yellow), var(--neon-green), var(--neon-blue), var(--neon-purple));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbowShift 3s linear infinite;
  }
  .neon-name, .neon-message { animation: neonFlicker 3s ease-in-out infinite; }

  @keyframes neonFlicker {
    0%, 100% { opacity: 1; }
    8% { opacity: 0.85; }
    10% { opacity: 1; }
    50% { opacity: 0.92; }
    52% { opacity: 1; }
    80% { opacity: 0.95; }
    82% { opacity: 1; }
  }

  @keyframes rainbowShift {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  /* Emoji decorations */
  .deco-emoji {
    font-size: clamp(24px, 4vw, 40px);
    display: inline-block;
    animation: emojiFloat 2s ease-in-out infinite;
  }
  .deco-emoji:nth-child(2) { animation-delay: -0.5s; }
  .deco-emoji:nth-child(3) { animation-delay: -1s; }

  @keyframes emojiFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-4px) scale(1.05); }
  }

  /* Emoji row */
  .emoji-row {
    margin: 15px 0;
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  /* Controls - Settings panel (hidden by default) */
  .controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(10, 10, 18, 0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 110, 199, 0.3);
    padding: 15px 20px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .controls.open {
    transform: translateY(0);
  }

  /* Invisible touch zone at bottom to reveal settings */
  .bottom-touch-zone {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    z-index: 99;
    /* completely invisible */
  }

  .controls-toggle {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, 0);
    width: 100%;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.7);
    font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .controls-toggle .arrow {
    display: inline-block;
    transition: transform 0.3s;
    font-size: 10px;
  }

  .controls.open .controls-toggle .arrow {
    transform: rotate(180deg);
  }

  .controls-content {
    padding-top: 44px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-height: 45vh;
    overflow-y: auto;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .control-label {
    color: rgba(255, 255, 255, 0.6);
    font-size: 13px;
    min-width: 50px;
    flex-shrink: 0;
  }

  .name-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 110, 199, 0.3);
    border-radius: 12px;
    padding: 10px 16px;
    color: white;
    font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
    font-size: 18px;
    outline: none;
    transition: border-color 0.3s;
  }
  .name-input:focus {
    border-color: var(--neon-pink);
    box-shadow: 0 0 10px rgba(255, 110, 199, 0.3);
  }
  .name-input::placeholder {
    color: rgba(255, 255, 255, 0.3);
  }

  /* Message selector */
  .msg-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex: 1;
  }

  .msg-btn {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 6px 14px;
    color: rgba(255, 255, 255, 0.7);
    font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .msg-btn.active {
    background: rgba(255, 110, 199, 0.2);
    border-color: var(--neon-pink);
    color: white;
  }

  /* Color buttons */
  .color-buttons {
    display: flex;
    gap: 10px;
    flex: 1;
  }
  .color-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.2);
    cursor: pointer;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .color-btn.active {
    border-color: white;
    transform: scale(1.2);
    box-shadow: 0 0 15px currentColor;
  }
  .color-btn.pink { background: var(--neon-pink); color: var(--neon-pink); }
  .color-btn.blue { background: var(--neon-blue); color: var(--neon-blue); }
  .color-btn.green { background: var(--neon-green); color: var(--neon-green); }
  .color-btn.rainbow { background: linear-gradient(135deg, var(--neon-pink), var(--neon-yellow), var(--neon-green), var(--neon-blue)); color: var(--neon-purple); }
  .color-btn.white { background: var(--neon-white); color: var(--neon-white); }

  /* Fullscreen button */
  .fullscreen-btn {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 10px 20px;
    color: rgba(255, 255, 255, 0.8);
    font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .fullscreen-btn:active {
    background: rgba(255, 110, 199, 0.2);
  }

  /* Glow slider */
  .slider-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-label {
    color: rgba(255, 255, 255, 0.4);
    font-size: 11px;
    flex-shrink: 0;
  }
  .glow-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.1);
    outline: none;
  }
  .glow-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--neon-pink);
    box-shadow: 0 0 8px rgba(255, 110, 199, 0.4);
    cursor: pointer;
  }

  /* Floating hearts animation */
  .floating-hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    overflow: hidden;
  }
  .heart {
    position: absolute;
    font-size: 24px;
    animation: floatUp 6s linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  /* Tap to burst effect */
  .burst {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    font-size: 20px;
    animation: burstAnim 1s ease-out forwards;
  }
  @keyframes burstAnim {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(2) translateY(-50px); opacity: 0; }
  }

  /* Reduced motion for accessibility & battery saving */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Performance mode - toggled via JS */
  body.perf-mode .stars,
  body.perf-mode .floating-hearts,
  body.perf-mode .corner { display: none; }
  body.perf-mode .neon-frame { box-shadow: none; animation: none; }
  body.perf-mode::before { display: none; }

  /* Landscape optimization */
  @media (orientation: landscape) {
    .neon-frame { padding: 20px 30px; }
    .neon-name { font-size: clamp(56px, 14vw, 160px); }
    .neon-message { font-size: clamp(32px, 7vw, 90px); }
    .emoji-row { margin: 6px 0; }
    .deco-emoji { font-size: clamp(20px, 3vw, 32px); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="main-container" id="mainContainer">
  <div class="neon-frame theme-pink" id="neonFrame">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="emoji-row" id="emojiTop">
      <span class="deco-emoji">⭐</span>
      <span class="deco-emoji">🌟</span>
      <span class="deco-emoji">⭐</span>
    </div>

    <div class="neon-name" id="neonName">우리 아이</div>
    <div class="neon-message" id="neonMessage">최고! 💕</div>

    <div class="emoji-row" id="emojiBottom">
      <span class="deco-emoji">🎵</span>
      <span class="deco-emoji">✨</span>
      <span class="deco-emoji">🎵</span>
    </div>
  </div>
</div>

<!-- Invisible touch zone to reveal settings -->
<div class="bottom-touch-zone" id="bottomTouchZone"></div>

<div class="controls" id="controls">
  <button class="controls-toggle" id="controlsToggle">
    <span class="arrow">▼</span> 닫기
  </button>
  <div class="controls-content">
    <div class="control-row">
      <span class="control-label">이름</span>
      <input type="text" class="name-input" id="nameInput" placeholder="아이 이름 입력" maxlength="10">
    </div>
    <div class="control-row">
      <span class="control-label">문구</span>
      <div class="msg-buttons" id="msgButtons">
        <button class="msg-btn active" data-msg="최고! 💕" data-emoji-top="⭐,🌟,⭐" data-emoji-bottom="🎵,✨,🎵">최고!</button>
        <button class="msg-btn" data-msg="사랑해! 💕" data-emoji-top="💖,💗,💖" data-emoji-bottom="💕,❤️,💕">사랑해!</button>
        <button class="msg-btn" data-msg="화이팅! 🔥" data-emoji-top="💪,🔥,💪" data-emoji-bottom="👏,🎉,👏">화이팅!</button>
        <button class="msg-btn" data-msg="반짝반짝 빛나는 ✨" data-emoji-top="✨,💫,✨" data-emoji-bottom="🌟,⭐,🌟">반짝반짝!</button>
        <button class="msg-btn" data-msg="멋진 무대 보여줘~! 🎤" data-emoji-top="🎤,🎶,🎤" data-emoji-bottom="👏,🎊,👏">멋진 무대!</button>
        <button class="msg-btn" data-msg="You're a Star! ⭐" data-emoji-top="⭐,👑,⭐" data-emoji-bottom="🌈,✨,🌈">Star!</button>
        <button class="msg-btn" data-msg="실수해도 괜찮아! 💪" data-emoji-top="🤗,💪,🤗" data-emoji-bottom="💕,🌈,💕">괜찮아!</button>
        <button class="msg-btn" data-msg="세상에서 제일 멋져! 👑" data-emoji-top="👑,💎,👑" data-emoji-bottom="🌟,💖,🌟">제일 멋져!</button>
      </div>
    </div>
    <div class="control-row">
      <span class="control-label">직접</span>
      <input type="text" class="name-input" id="customMsgInput" placeholder="직접 문구 입력 (예: 사랑하는 우리 딸!)" maxlength="20">
    </div>
    <div class="control-row">
      <span class="control-label">색상</span>
      <div class="color-buttons">
        <button class="color-btn pink active" data-theme="pink"></button>
        <button class="color-btn blue" data-theme="blue"></button>
        <button class="color-btn green" data-theme="green"></button>
        <button class="color-btn rainbow" data-theme="rainbow"></button>
        <button class="color-btn white" data-theme="white"></button>
      </div>
    </div>
    <div class="control-row">
      <span class="control-label">글로우</span>
      <div class="slider-wrap">
        <span class="slider-label">은은</span>
        <input type="range" class="glow-slider" id="glowSlider" min="0" max="100" value="40">
        <span class="slider-label">화려</span>
      </div>
    </div>
    <button class="fullscreen-btn" id="fullscreenBtn">📱 전체화면 (홈 화면에 추가 권장)</button>
    <button class="fullscreen-btn" id="perfModeBtn" style="margin-top:6px;">⚡ 절전모드 (발열·배터리 절약)</button>
    <p style="color:rgba(255,255,255,0.35); font-size:11px; margin-top:10px; line-height:1.5; text-align:center;">
      💡 <b>iPad 최적 사용법:</b> Safari 공유(↑) → "홈 화면에 추가" → 홈 아이콘으로 실행하면 주소창 없이 전체화면!
    </p>
  </div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 25; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    starsEl.appendChild(star);
  }

  // Floating hearts
  const heartsContainer = document.getElementById('floatingHearts');
  const heartEmojis = ['💖', '💕', '❤️', '💗', '✨', '🌟', '⭐', '🎵', '💜', '💛'];
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.animationDelay = Math.random() * 2 + 's';
    heart.style.animationDuration = (4 + Math.random() * 4) + 's';
    heart.style.fontSize = (12 + Math.random() * 12) + 'px';
    heartsContainer.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
  }
  let heartInterval = setInterval(createHeart, 1500);

  // Controls toggle - hidden by default, tap bottom to reveal, auto-hide
  const controls = document.getElementById('controls');
  const controlsToggle = document.getElementById('controlsToggle');
  const bottomTouchZone = document.getElementById('bottomTouchZone');
  let autoHideTimer = null;

  function showControls() {
    controls.classList.add('open');
    clearTimeout(autoHideTimer);
    autoHideTimer = setTimeout(hideControls, 6000);
  }

  function hideControls() {
    controls.classList.remove('open');
    clearTimeout(autoHideTimer);
  }

  // Reset auto-hide on any interaction inside controls
  controls.addEventListener('pointerdown', () => {
    clearTimeout(autoHideTimer);
    autoHideTimer = setTimeout(hideControls, 6000);
  });

  // Pause auto-hide while typing
  controls.querySelectorAll('input').forEach(input => {
    input.addEventListener('focus', () => clearTimeout(autoHideTimer));
    input.addEventListener('blur', () => {
      autoHideTimer = setTimeout(hideControls, 4000);
    });
  });

  // Bottom touch zone reveals settings
  bottomTouchZone.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    showControls();
  });

  // Toggle button closes
  controlsToggle.addEventListener('click', () => {
    if (controls.classList.contains('open')) {
      hideControls();
    } else {
      showControls();
    }
  });

  // Name input
  const nameInput = document.getElementById('nameInput');
  const neonName = document.getElementById('neonName');
  nameInput.addEventListener('input', () => {
    const name = nameInput.value.trim();
    neonName.textContent = name ? name : '우리 아이';
  });

  // Message selection
  const msgButtons = document.querySelectorAll('.msg-btn');
  const neonMessage = document.getElementById('neonMessage');
  const emojiTop = document.getElementById('emojiTop');
  const emojiBottom = document.getElementById('emojiBottom');
  const customMsgInput = document.getElementById('customMsgInput');

  // Default emoji set for custom messages
  const defaultEmojis = { top: '⭐,✨,⭐', bottom: '💕,🌟,💕' };

  function setEmojis(topStr, bottomStr) {
    const topEmojis = topStr.split(',');
    const bottomEmojis = bottomStr.split(',');
    emojiTop.innerHTML = topEmojis.map(e => `<span class="deco-emoji">${e}</span>`).join('');
    emojiBottom.innerHTML = bottomEmojis.map(e => `<span class="deco-emoji">${e}</span>`).join('');
  }

  // Preset buttons
  msgButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      msgButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      customMsgInput.value = '';
      neonMessage.textContent = btn.dataset.msg;
      setEmojis(btn.dataset.emojiTop, btn.dataset.emojiBottom);
    });
  });

  // Custom message input
  customMsgInput.addEventListener('input', () => {
    const msg = customMsgInput.value.trim();
    if (msg) {
      msgButtons.forEach(b => b.classList.remove('active'));
      neonMessage.textContent = msg;
      setEmojis(defaultEmojis.top, defaultEmojis.bottom);
    } else {
      // Empty → revert to first preset
      const firstBtn = msgButtons[0];
      firstBtn.classList.add('active');
      neonMessage.textContent = firstBtn.dataset.msg;
      setEmojis(firstBtn.dataset.emojiTop, firstBtn.dataset.emojiBottom);
    }
  });

  // Color theme
  const colorBtns = document.querySelectorAll('.color-btn');
  const neonFrame = document.getElementById('neonFrame');
  colorBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      colorBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      neonFrame.className = `neon-frame theme-${btn.dataset.theme}`;
      applyGlow();
    });
  });

  // Glow intensity slider
  const glowSlider = document.getElementById('glowSlider');

  const themeColors = {
    pink:    [255, 110, 199],
    blue:    [0, 212, 255],
    green:   [57, 255, 20],
    rainbow: [255, 240, 31],  // message color
    white:   [255, 255, 255],
  };

  function getCurrentTheme() {
    const cls = neonFrame.className;
    const match = cls.match(/theme-(\w+)/);
    return match ? match[1] : 'pink';
  }

  function buildShadow(r, g, b, t) {
    // t = 0~1 (slider normalized)
    const b1 = Math.round(4 + 8 * t);
    const b2 = Math.round(10 + 30 * t);
    const b3 = Math.round(16 + 64 * t);
    const a1 = (0.6 + 0.4 * t).toFixed(2);
    const a2 = (0.15 + 0.5 * t).toFixed(2);
    const a3 = (0.03 + 0.27 * t).toFixed(2);
    return `0 0 ${b1}px rgba(${r},${g},${b},${a1}), 0 0 ${b2}px rgba(${r},${g},${b},${a2}), 0 0 ${b3}px rgba(${r},${g},${b},${a3})`;
  }

  function applyGlow() {
    const t = glowSlider.value / 100;
    const theme = getCurrentTheme();
    const [r, g, b] = themeColors[theme] || themeColors.pink;
    const shadow = buildShadow(r, g, b, t);

    // Apply to message (always text-shadow)
    neonMessage.style.textShadow = shadow;

    // Rainbow name uses filter (gradient text), others use text-shadow
    if (theme === 'rainbow') {
      const [pr, pg, pb] = themeColors.pink;
      const [br2, bg2, bb2] = themeColors.blue;
      const d1 = Math.round(6 + 18 * t);
      const d2 = Math.round(10 + 30 * t);
      const da1 = (0.1 + 0.45 * t).toFixed(2);
      const da2 = (0.05 + 0.25 * t).toFixed(2);
      neonName.style.textShadow = '';
      neonName.style.filter = `drop-shadow(0 0 ${d1}px rgba(${pr},${pg},${pb},${da1})) drop-shadow(0 0 ${d2}px rgba(${br2},${bg2},${bb2},${da2}))`;
    } else {
      neonName.style.filter = '';
      neonName.style.textShadow = shadow;
    }
  }

  glowSlider.addEventListener('input', applyGlow);
  // Apply initial glow
  applyGlow();

  // Fullscreen (best effort - may not work on iPadOS Safari)
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const el = document.documentElement;
    if (el.requestFullscreen) {
      el.requestFullscreen().catch(() => {});
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen();
    }
    hideControls();
  });

  // Performance mode toggle
  const perfBtn = document.getElementById('perfModeBtn');
  perfBtn.addEventListener('click', () => {
    document.body.classList.toggle('perf-mode');
    const isPerf = document.body.classList.contains('perf-mode');
    perfBtn.textContent = isPerf ? '🎨 효과모드 (화려하게)' : '⚡ 절전모드 (발열·배터리 절약)';
    // Stop/restart heart generation
    if (isPerf) {
      clearInterval(heartInterval);
      heartsContainer.innerHTML = '';
    } else {
      heartInterval = setInterval(createHeart, 1500);
    }
  });

  // Tap burst effect (pointerdown for instant response on iOS)
  document.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.controls') || e.target.closest('.bottom-touch-zone')) return;
    const emojis = ['💖', '✨', '⭐', '🌟', '💕', '🎉'];
    for (let i = 0; i < 2; i++) {
      const burst = document.createElement('div');
      burst.className = 'burst';
      burst.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      burst.style.left = (e.clientX + (Math.random() - 0.5) * 60) + 'px';
      burst.style.top = (e.clientY + (Math.random() - 0.5) * 60) + 'px';
      document.body.appendChild(burst);
      setTimeout(() => burst.remove(), 1000);
    }
  });

  // Wake Lock - 화면 꺼짐 방지 (API + 비디오 폴백)
  let wakeLock = null;
  let noSleepVideo = null;

  // 방법1: Wake Lock API (iPad Safari 16.4+ 직접 열기)
  const requestWakeLock = async () => {
    if (!('wakeLock' in navigator)) { startVideoFallback(); return; }
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
      console.log('Wake Lock: API active');
    } catch (err) {
      console.log(`Wake Lock API failed: ${err.message} → video fallback`);
      startVideoFallback();
    }
  };

  // 방법2: 무음 비디오 루프 (폴백 - 거의 모든 브라우저에서 동작)
  function startVideoFallback() {
    if (noSleepVideo) return;
    noSleepVideo = document.createElement('video');
    noSleepVideo.setAttribute('playsinline', '');
    noSleepVideo.setAttribute('muted', '');
    noSleepVideo.setAttribute('autoplay', '');
    noSleepVideo.muted = true;
    noSleepVideo.loop = true;
    noSleepVideo.style.cssText = 'position:fixed;top:-1px;left:-1px;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1;';
    noSleepVideo.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAA0BtZGF0AAACrwYF//+r3EXpvebZSLeWLNgg2SPu73gyNjQgLSBjb3JlIDE2NCByMzEwOCBiYWVlNDAwIC0gSC4yNjQvTVBFRy00IEFWQyBjb2RlYyAtIENvcHlsZWZ0IDIwMDMtMjAyMyAtIGh0dHA6Ly93d3cudmlkZW9sYW4ub3JnL3gyNjQuaHRtbCAtIG9wdGlvbnM6IGNhYmFjPTEgcmVmPTMgZGVibG9jaz0xOjA6MCBhbmFseXNlPTB4MzoweDExMyBtZT1oZXggc3VibWU9NyBwc3k9MSBwc3lfcmQ9MS4wMDowLjAwIG1peGVkX3JlZj0xIG1lX3JhbmdlPTE2IGNocm9tYV9tZT0xIHRyZWxsaXM9MSA4eDhkY3Q9MSBjcW09MCBkZWFkem9uZT0yMSwxMSBmYXN0X3Bza2lwPTEgY2hyb21hX3FwX29mZnNldD0tMiB0aHJlYWRzPTEgbG9va2FoZWFkX3RocmVhZHM9MSBzbGljZWRfdGhyZWFkcz0wIG5yPTAgZGVjaW1hdGU9MSBpbnRlcmxhY2VkPTAgYmx1cmF5X2NvbXBhdD0wIGNvbnN0cmFpbmVkX2ludHJhPTAgYmZyYW1lcz0zIGJfcHlyYW1pZD0yIGJfYWRhcHQ9MSBiX2JpYXM9MCBkaXJlY3Q9MSB3ZWlnaHRiPTEgb3Blbl9nb3A9MCB3ZWlnaHRwPTIga2V5aW50PTI1MCBrZXlpbnRfbWluPTI1IHNjZW5lY3V0PTQwIGludHJhX3JlZnJlc2g9MCByY19sb29rYWhlYWQ9NDAgcmM9Y3JmIG1idHJlZT0xIGNyZj0yMy4wIHFjb21wPTAuNjAgcXBtaW49MCBxcG1heD02OSBxcHN0ZXA9NCBpcF9yYXRpbz0xLjQwIGFxPTE6MS4wMACAAAAAD2WIhAA3//728P4FNjuY0AAAAAd0GAAA';
    document.body.appendChild(noSleepVideo);
    const playPromise = noSleepVideo.play();
    if (playPromise) playPromise.catch(() => console.log('Video fallback: autoplay blocked, will retry on touch'));
    console.log('Wake Lock: video fallback active');
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      if (!wakeLock && !noSleepVideo) requestWakeLock();
      if (noSleepVideo && noSleepVideo.paused) noSleepVideo.play().catch(() => {});
    }
  });

  // 첫 터치에서만 시도 (autoplay 정책/제스처 요구 대응)
  document.addEventListener('pointerdown', async () => {
    if (!wakeLock && !noSleepVideo) await requestWakeLock();
    if (noSleepVideo && noSleepVideo.paused) noSleepVideo.play().catch(() => {});
  }, { once: true });
</script>
</body>
